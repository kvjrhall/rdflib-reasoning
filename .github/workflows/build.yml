name: build

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  validate-test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Verify lockfile is current
        run: uv lock --check

      - name: Install workspace
        run: make install-all

      - name: Validate
        run: make validate

      - name: Test
        run: make test

      - name: Publish coverage comment and badge data
        if: always()
        uses: py-cov-action/python-coverage-comment-action@v3
        with:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload coverage artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-artifacts
          path: |
            coverage.xml
            htmlcov

  build-distributions:
    needs: validate-test
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Install packaging tools
        run: python -m pip install --upgrade build cyclonedx-bom twine

      - name: Build all distributions
        run: |
          python -m build --sdist --wheel --outdir dist/root .
          python -m build --sdist --wheel --outdir dist/axioms rdflib-reasoning-axioms
          python -m build --sdist --wheel --outdir dist/engine rdflib-reasoning-engine
          python -m build --sdist --wheel --outdir dist/middleware rdflib-reasoning-middleware

      - name: Validate built distributions
        run: python -m twine check dist/root/* dist/axioms/* dist/engine/* dist/middleware/*

      - name: Smoke test built wheels in a fresh environment
        run: |
          python -m venv smoke-venv
          smoke-venv/bin/python -m pip install --upgrade pip
          smoke-venv/bin/python -m pip install cyclonedx-bom dist/root/*.whl dist/axioms/*.whl dist/engine/*.whl dist/middleware/*.whl
          smoke-venv/bin/python -c "import rdflib_reasoning; import rdflib_reasoning.axiom.common; import rdflib_reasoning.engine; import rdflib_reasoning.middleware"

      - name: Generate SBOM
        run: smoke-venv/bin/python -m cyclonedx_py environment --output-file dist/sbom.json --of JSON

      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: python-distributions
          path: |
            dist
            smoke-venv

  publish-testpypi:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: build-distributions
    runs-on: ubuntu-latest
    environment:
      name: testpypi
      url: https://test.pypi.org/
    permissions:
      id-token: write

    steps:
      - name: Download built distributions
        uses: actions/download-artifact@v8
        with:
          name: python-distributions
          path: artifacts

      - name: Publish rdflib-reasoning to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          packages-dir: artifacts/dist/root
          attestations: false

      - name: Publish rdflib-reasoning-axioms to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          packages-dir: artifacts/dist/axioms
          attestations: false

      - name: Publish rdflib-reasoning-engine to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          packages-dir: artifacts/dist/engine
          attestations: false

      - name: Publish rdflib-reasoning-middleware to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          packages-dir: artifacts/dist/middleware
          attestations: false

  docs-linkcheck:
    continue-on-error: true
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Install workspace
        run: make install-all

      - name: Check documentation links
        run: make docs-linkcheck

  docs-upload:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Install workspace
        run: make install-all

      - name: Build documentation site
        run: make docs

      - name: Upload documentation site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'docs-build/html'

  docs-deploy:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [validate-test, docs-upload]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.docs-deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: docs-deployment
        uses: actions/deploy-pages@v5

  security-audit:
    continue-on-error: true
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Install workspace
        run: make install-all

      - name: Audit dependencies
        run: make audit

  release-drafter:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: build-distributions
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Draft next release
        uses: release-drafter/release-drafter@v7
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
