name: build

on:
  push:
    branches-ignore:
      - "python-coverage-comment-action-data"
  pull_request:
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  validate-test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Verify lockfile is current
        run: uv lock --check

      - name: Install workspace
        run: make install-all

      - name: Validate
        run: make validate

      - name: Test
        run: make test

      - name: Build documentation site
        run: make docs

      - name: Publish coverage comment and badge data
        if: always()
        uses: py-cov-action/python-coverage-comment-action@v3
        with:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload coverage artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-artifacts
          path: |
            coverage.xml
            htmlcov

  build-distributions:
    needs: validate-test
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install packaging tools
        run: python -m pip install --upgrade build cyclonedx-bom twine

      - name: Build all distributions
        run: |
          python -m build --sdist --wheel --outdir dist/root .
          python -m build --sdist --wheel --outdir dist/axioms rdflib-reasoning-axioms
          python -m build --sdist --wheel --outdir dist/engine rdflib-reasoning-engine
          python -m build --sdist --wheel --outdir dist/middleware rdflib-reasoning-middleware

      - name: Validate built distributions
        run: python -m twine check dist/root/* dist/axioms/* dist/engine/* dist/middleware/*

      - name: Smoke test built wheels in a fresh environment
        run: |
          python -m venv smoke-venv
          smoke-venv/bin/python -m pip install --upgrade pip
          smoke-venv/bin/python -m pip install cyclonedx-bom dist/root/*.whl dist/axioms/*.whl dist/engine/*.whl dist/middleware/*.whl
          smoke-venv/bin/python -c "import rdflib_reasoning; import rdflibr.axiom.common; import rdflibr.engine; import rdflibr.middleware"

      - name: Generate SBOM
        run: smoke-venv/bin/python -m cyclonedx_py environment --output-file dist/sbom.json --of JSON

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: python-distributions
          path: |
            dist
            smoke-venv

  publish-testpypi:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: build-distributions
    runs-on: ubuntu-latest
    environment:
      name: testpypi
      url: https://test.pypi.org/
    permissions:
      id-token: write

    steps:
      - name: Download built distributions
        uses: actions/download-artifact@v4
        with:
          name: python-distributions
          path: artifacts

      - name: Publish package distributions to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          packages-dir: artifacts/dist

  docs-linkcheck:
    continue-on-error: true
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Install workspace
        run: make install-all

      - name: Check documentation links
        run: make docs-linkcheck

  security-audit:
    continue-on-error: true
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Install workspace
        run: make install-all

      - name: Audit dependencies
        run: make audit

  release-drafter:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: build-distributions
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Draft next release
        uses: release-drafter/release-drafter@v6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
