name: release

on:
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      ref:
        description: Git ref to build and publish (for example, v0.1.1)
        required: true
        type: string

permissions:
  contents: read

jobs:
  build-distributions:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'release' && github.event.release.tag_name || inputs.ref }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Install packaging tools
        run: python -m pip install --upgrade build cyclonedx-bom twine

      - name: Build all distributions
        run: |
          python -m build --sdist --wheel --outdir dist/root .
          python -m build --sdist --wheel --outdir dist/axioms rdflib-reasoning-axioms
          python -m build --sdist --wheel --outdir dist/engine rdflib-reasoning-engine
          python -m build --sdist --wheel --outdir dist/middleware rdflib-reasoning-middleware

      - name: Check distributions
        run: python -m twine check dist/root/* dist/axioms/* dist/engine/* dist/middleware/*

      - name: Smoke test built wheels in a fresh environment
        run: |
          python -m venv smoke-venv
          smoke-venv/bin/python -m pip install --upgrade pip
          smoke-venv/bin/python -m pip install cyclonedx-bom dist/root/*.whl dist/axioms/*.whl dist/engine/*.whl dist/middleware/*.whl
          smoke-venv/bin/python -c "import rdflib_reasoning; import rdflib_reasoning.axiom.common; import rdflib_reasoning.engine; import rdflib_reasoning.middleware"

      - name: Generate SBOM
        run: smoke-venv/bin/python -m cyclonedx_py environment --output-file dist/sbom.json --of JSON

      - name: Upload release artifacts
        uses: actions/upload-artifact@v7
        with:
          name: release-distributions
          path: |
            dist
            smoke-venv

  publish-pypi:
    if: github.event_name == 'release' || github.event_name == 'workflow_dispatch'
    needs: build-distributions
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/
    permissions:
      id-token: write

    steps:
      - name: Download built distributions
        uses: actions/download-artifact@v8
        with:
          name: release-distributions
          path: artifacts

      - name: Publish rdflib-reasoning to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: artifacts/dist/root

      - name: Publish rdflib-reasoning-axioms to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: artifacts/dist/axioms

      - name: Publish rdflib-reasoning-engine to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: artifacts/dist/engine

      - name: Publish rdflib-reasoning-middleware to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: artifacts/dist/middleware
