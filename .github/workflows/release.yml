name: release

on:
  release:
    types:
      - published
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-distributions:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install build frontend
        run: python -m pip install --upgrade build twine

      - name: Build all distributions
        run: |
          python -m build --sdist --wheel --outdir dist/root .
          python -m build --sdist --wheel --outdir dist/axioms rdflib-reasoning-axioms
          python -m build --sdist --wheel --outdir dist/engine rdflib-reasoning-engine
          python -m build --sdist --wheel --outdir dist/middleware rdflib-reasoning-middleware

      - name: Check distributions
        run: python -m twine check dist/root/* dist/axioms/* dist/engine/* dist/middleware/*

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-distributions
          path: dist

  publish-testpypi:
    needs: build-distributions
    runs-on: ubuntu-latest
    environment: testpypi
    env:
      TEST_PYPI_API_TOKEN: ${{ secrets.TEST_PYPI_API_TOKEN }}

    steps:
      - name: Skip when TestPyPI token is not configured
        if: env.TEST_PYPI_API_TOKEN == ''
        run: echo "TEST_PYPI_API_TOKEN is not configured; skipping TestPyPI upload."

      - name: Download built distributions
        if: env.TEST_PYPI_API_TOKEN != ''
        uses: actions/download-artifact@v4
        with:
          name: release-distributions
          path: dist

      - name: Set up Python
        if: env.TEST_PYPI_API_TOKEN != ''
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install Twine
        if: env.TEST_PYPI_API_TOKEN != ''
        run: python -m pip install --upgrade twine

      - name: Upload to TestPyPI
        if: env.TEST_PYPI_API_TOKEN != ''
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ env.TEST_PYPI_API_TOKEN }}
          TWINE_REPOSITORY_URL: https://test.pypi.org/legacy/
        run: python -m twine upload --skip-existing dist/root/* dist/axioms/* dist/engine/* dist/middleware/*
